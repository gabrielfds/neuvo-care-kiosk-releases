name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python for node-gyp
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ImageMagick
        shell: powershell
        run: choco install imagemagick -y --no-progress

      - name: Generate Windows icon
        shell: powershell
        run: |
          magick assets/icon.svg -resize 256x256 assets/icon.png
          magick assets/icon.png -define icon:auto-resize=256,128,64,48,32,16 assets/icon.ico

      - name: Install dependencies
        shell: powershell
        run: npm install --msvs_version=2022

      - name: Rebuild native modules for Electron
        shell: powershell
        run: npx @electron/rebuild --parallel

      - name: Build & publish installer
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run release

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: neuvo-care-kiosk-windows
          path: dist/*.exe
